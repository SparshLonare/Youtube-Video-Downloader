<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Youtube Video Downloader
    </title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Youtube Video Downloader</h1>
        <form id="downloadForm" onsubmit="handleDownload(event)">
            <input type="text" id="urlInput" name="url" placeholder="Enter YouTube video URL" required>
            <button type="submit">Download</button>
        </form>
        <p class="note">Download Highest Quality Youtube Videos.</p>
    </div>

    <script>
        function handleDownload(event) {
            event.preventDefault();
            const url = document.getElementById('urlInput').value;
            
            if (!url) {
                alert('Please enter a YouTube URL');
                return;
            }
            
            const formData = new FormData();
            formData.append('url', url);
            
            fetch('/download', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Download failed');
                }
                return response.blob();
            })
            .then(blob => {
                // Create blob URL and trigger download
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = 'video.mp4';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            })
            .catch(error => {
                alert('Error: ' + error.message);
                console.error('Download error:', error);
            });
        }
    </script>
</body>
</html>
